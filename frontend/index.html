<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
        <title>TRANQUIL</title>

        <!-- PWA Manifest -->
        <link rel='manifest' href='/manifest.json' />

        <!-- Theme color -->
        <meta name='theme-color' content='#2a9d8f' />

        <!-- iOS PWA meta tags -->
        <meta name='apple-mobile-web-app-capable' content='yes' />
        <meta name='apple-mobile-web-app-status-bar-style' content='default' />
        <meta name='apple-mobile-web-app-title' content='TRANQUIL' />
        <link rel='apple-touch-icon' href='/assets/generated/icon-192.dim_192x192.png' />

        <!-- General meta -->
        <meta name='description' content='TRANQUIL – your personal wellness and stress management companion.' />
        <meta name='mobile-web-app-capable' content='yes' />
    </head>
    <body>
        <div id='root'></div>
        <script type='module' src='/src/main.tsx'></script>

        <!-- Service Worker Registration -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('/sw.js').catch(function (err) {
                        console.warn('Service worker registration failed:', err);
                    });
                });
            }
        </script>
    </body>
</html>
